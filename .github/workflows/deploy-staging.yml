name: Deploy — Staging (Apothem)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  IMAGE: ghcr.io/neurowatt/aiwatt-backend
  REGISTRY: ghcr.io

jobs:
  # ── Re-run CI gate ───────────────────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Build & push backend image ───────────────────────────────────────────────
  build-backend:
    name: Build + push backend image
    runs-on: ubuntu-22.04
    needs: [ci]
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build frontend ───────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend (staging)
    runs-on: ubuntu-22.04
    needs: [ci]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build
        working-directory: frontend
        run: npm run build -- --mode staging
        env:
          VITE_ENV: staging
          VITE_CHAIN_ID: '51'
          VITE_RPC_URL: https://erpc.apothem.network
          VITE_API_URL: https://api-staging.aiwatt.io
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_USDC_ADDRESS: '0x6404e052B842fB1c82C1A404C7E02BE2A92A7970'
          VITE_USDT_ADDRESS: '0x59828572B8ABEDa2A0f963ECC94b80Eee01bbA6c'
          VITE_WATT_ADDRESS: '0x974B2bd650c88D290469a471DeB1Ee6aC55AD2d9'
          VITE_SWATT_ADDRESS: '0x08c14aCc5547f03fC523453e005A243C50A7aa94'
          VITE_MINT_ENGINE_ADDRESS: '0x37a1d3b072af3055993215DB82e3832dA2d10AEd'
          VITE_LENDING_POOL_ADDRESS: ${{ secrets.STAGING_LENDING_POOL_ADDRESS }}
          VITE_WEV_QUEUE_ADDRESS: ${{ secrets.STAGING_WEV_QUEUE_ADDRESS }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-staging-${{ github.sha }}
          path: frontend/dist/

  # ── Deploy backend to staging VPS ────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → staging VPS
    runs-on: ubuntu-22.04
    needs: [build-backend]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Write staging .env
        run: |
          cat > /tmp/staging.env <<EOF
          PORT=8080
          APP_ENV=staging
          ALLOWED_ORIGINS=https://staging.aiwatt.io
          DATABASE_URL=${{ secrets.STAGING_DB_URL }}
          REDIS_URL=${{ secrets.STAGING_REDIS_URL }}
          JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          XDC_RPC_URL=https://erpc.apothem.network
          XDC_CHAIN_ID=51
          VERIFLOW_SIGNER_PRIVATE_KEY=${{ secrets.STAGING_SIGNER_PRIVATE_KEY }}
          WATT_USD_PROXY_ADDRESS=0x974B2bd650c88D290469a471DeB1Ee6aC55AD2d9
          SWATT_USD_PROXY_ADDRESS=0x08c14aCc5547f03fC523453e005A243C50A7aa94
          MINT_ENGINE_PROXY_ADDRESS=0x37a1d3b072af3055993215DB82e3832dA2d10AEd
          ASSET_REGISTRY_PROXY_ADDRESS=${{ secrets.STAGING_ASSET_REGISTRY_ADDRESS }}
          OCNFT_PROXY_ADDRESS=${{ secrets.STAGING_OCNFT_ADDRESS }}
          HEALTH_ATTESTATION_PROXY_ADDRESS=${{ secrets.STAGING_HEALTH_ATTESTATION_ADDRESS }}
          LENDING_POOL_PROXY_ADDRESS=${{ secrets.STAGING_LENDING_POOL_ADDRESS }}
          WEV_QUEUE_PROXY_ADDRESS=${{ secrets.STAGING_WEV_QUEUE_ADDRESS }}
          EOF

      - name: Install migrate CLI
        run: go install -tags 'mysql' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run migrations on staging DB
        run: migrate -path backend/scripts/migrations -database "${{ secrets.STAGING_DB_URL }}" up

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: IMAGE
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE }}:staging-latest
            docker stop aiwatt-api 2>/dev/null || true
            docker rm   aiwatt-api 2>/dev/null || true
            docker run -d \
              --name aiwatt-api \
              --restart unless-stopped \
              --env-file /opt/aiwatt/staging.env \
              -p 8080:8080 \
              ${{ env.IMAGE }}:staging-latest
            docker image prune -f

      - name: Copy env file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: /tmp/staging.env
          target: /opt/aiwatt/staging.env
          strip_components: 2

  # ── Deploy frontend to staging VPS ───────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → staging
    runs-on: ubuntu-22.04
    needs: [build-frontend]
    environment: staging

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-staging-${{ github.sha }}
          path: dist/

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /var/www/staging.aiwatt.io/
          remote_host: ${{ secrets.STAGING_SSH_HOST }}
          remote_user: ${{ secrets.STAGING_SSH_USER }}
          remote_key: ${{ secrets.STAGING_SSH_KEY }}

  # ── Health check ─────────────────────────────────────────────────────────────
  health-check:
    name: Health check
    runs-on: ubuntu-22.04
    needs: [deploy-backend, deploy-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Check API health
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.aiwatt.io/api/v1/vault/stats 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Check frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.aiwatt.io)
          echo "Frontend HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1
