# config.example.yaml — Template for backend configuration.
# Copy this to config.yaml and fill in real values, or use environment variables.
# Real values must NEVER be committed to the repo.

server:
  port: "8080"
  env: development  # development | production

database:
  url: "mysql://aiwatt:aiwatt@localhost:3306/aiwatt?parseTime=true"

redis:
  url: "redis://localhost:6379/0"

xdc:
  rpc_url: "https://erpc.apothem.network"  # Apothem testnet
  # rpc_url: "https://rpc.xdcrpc.com"  # Mainnet

jwt:
  secret: "change-me"

veriflow:
  signer_private_key: "0x"

pinata:
  api_key: ""

kyc:
  provider_api_key: ""

bitgo:
  api_key: ""
